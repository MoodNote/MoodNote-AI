model:
    # name: "vinai/phobert-base"     # 135M params, hidden_size=768
    name: "vinai/phobert-large"    # 370M params, hidden_size=1024 — nâng cấp để đạt F1-Macro ~0.68+
    num_labels: 7
    max_seq_length: 128
    dropout: 0.3          # giữ nguyên; R-Drop + large model cung cấp đủ regularization
    label_smoothing: 0.15 # giữ nguyên
    focal_gamma: 2.5      # giữ nguyên

emotion_labels:
    0: "Enjoyment"
    1: "Sadness"
    2: "Anger"
    3: "Fear"
    4: "Disgust"
    5: "Surprise"
    6: "Other"

sentiment_scores:
    Enjoyment: 1.0
    Surprise: 0.3
    Other: 0.0
    Fear: -0.5
    Disgust: -0.7
    Sadness: -0.8
    Anger: -0.9

preprocessing:
    segmenter: "pyvi" # Fast alternative to VnCoreNLP
    lowercase: false

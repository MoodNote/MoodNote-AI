training:
    learning_rate: 1.8e-5 # Run 1: giảm nhẹ LR để ổn định hơn
    batch_size: 16
    gradient_accumulation_steps: 2 # effective batch = 16 * 2 = 32
    num_epochs: 15 # merged dataset lớn hơn 3-4x, giảm ceiling để tránh overfit
    warmup_ratio: 0.10 # tăng từ 0.06 → warmup dài hơn, training ổn định hơn
    weight_decay: 0.05 # tăng từ 0.01 → L2 regularization mạnh hơn cho dataset nhỏ
    fp16: true
    seed: 42
    early_stopping_patience: 7 # tăng từ 3 → đủ rộng để vượt qua fluctuation (~350 steps sau peak)
    use_llrd: true # Layer-wise LR Decay
    llrd_factor: 0.9 # mỗi layer giảm 10% so với layer trên
    use_class_weights: true # tính class weights từ training data

optimizer:
    type: "AdamW"
    betas: [0.9, 0.999]
    eps: 1e-8

scheduler:
    type: "cosine"

logging:
    log_steps: 50 # merged dataset ~3-4x lớn hơn, giảm log noise
    eval_steps: 200 # ~3 evals/epoch với ~21k train samples (batch effective=32)
    save_steps: 200 # match eval_steps
    save_total_limit: 4

wandb:
    project: "moodnote-ai"
    name: "phobert-base-v3-merged-vigoemotions"
    enabled: true

training:
    learning_rate: 2e-5  # standard base-size RoBERTa fine-tuning LR
    batch_size: 16       # T4 16GB safe với ViSoBERT 135M + R-Drop
    gradient_accumulation_steps: 2 # effective batch = 16 * 2 = 32
    num_epochs: 20
    warmup_ratio: 0.1
    weight_decay: 0.1
    fp16: true
    seed: 42
    early_stopping_patience: 3   # patience=3 × eval_steps=100 = 300 steps, đủ để xác nhận plateau
    use_llrd: true # Layer-wise LR Decay
    llrd_factor: 0.85 # mỗi layer giảm 15% so với layer trên — bảo vệ pretrained features tốt hơn
    use_class_weights: true
    rdrop_alpha: 1.0  # R-Drop enabled — regularization chống overfitting

optimizer:
    type: "AdamW"
    betas: [0.9, 0.999]
    eps: 1e-8

scheduler:
    type: "cosine"

logging:
    log_steps: 50 # merged dataset ~3-4x lớn hơn, giảm log noise
    eval_steps: 100 # granular hơn để bắt best checkpoint sớm hơn
    save_steps: 100 # match eval_steps
    save_total_limit: 4

wandb:
    project: "moodnote-ai"
    name: "phobert-base-v2"
    enabled: true

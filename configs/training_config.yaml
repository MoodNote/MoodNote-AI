training:
    learning_rate: 8e-6  # giảm từ 1e-5 → large model cần LR nhỏ hơn để tránh catastrophic forgetting
    batch_size: 4        # giảm từ 8 → PhoBERT-large (370M) + R-Drop cần nhiều VRAM hơn trên T4 16GB
    gradient_accumulation_steps: 8 # effective batch = 4 * 8 = 32 (giữ nguyên effective batch)
    num_epochs: 20
    warmup_ratio: 0.1
    weight_decay: 0.05
    fp16: true
    seed: 42
    early_stopping_patience: 10
    use_llrd: true # Layer-wise LR Decay
    llrd_factor: 0.9 # mỗi layer giảm 10% so với layer trên (24 layers với large)
    use_class_weights: true
    rdrop_alpha: 0.0  # R-Drop alpha (0.0 = tắt); override trong notebook: Stage 2 dùng 4.0

optimizer:
    type: "AdamW"
    betas: [0.9, 0.999]
    eps: 1e-8

scheduler:
    type: "cosine"

logging:
    log_steps: 50 # merged dataset ~3-4x lớn hơn, giảm log noise
    eval_steps: 100 # granular hơn để bắt best checkpoint sớm hơn
    save_steps: 100 # match eval_steps
    save_total_limit: 4

wandb:
    project: "moodnote-ai"
    name: "phobert-large-v1"
    enabled: true
